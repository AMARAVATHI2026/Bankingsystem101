<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — BankSecurity</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">🏦</div>
      <h1>Open an Account</h1>
      <p>Join BankSecurity today</p>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger">
      <span>⚠️</span>
      <span th:text="${errorMsg}">Error</span>
    </div>

    <form th:action="@{/auth/register}" method="post" th:object="${user}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input type="text" id="name" name="name" class="form-control"
               th:field="*{name}" placeholder="John Doe" required/>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
             style="color:#f87171;font-size:12px;margin-top:4px"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               th:field="*{email}" placeholder="you@example.com" required/>
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
             style="color:#f87171;font-size:12px;margin-top:4px"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               th:field="*{password}" placeholder="Min. 8 characters" required minlength="6"/>
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
             style="color:#f87171;font-size:12px;margin-top:4px"></div>
        <p class="form-hint">A default Savings account will be created for you automatically.</p>
      </div>

      <button type="submit" class="btn btn-gold btn-full btn-lg" style="margin-top:8px">
        Create Account →
      </button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer-link">
      Already have an account?
      <a th:href="@{/login}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
