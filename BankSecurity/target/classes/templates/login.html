<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — BankSecurity</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">🏦</div>
      <h1>BankSecurity</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Alerts -->
    <div th:if="${errorMsg}" class="alert alert-danger">
      <span>⚠️</span>
      <span th:text="${errorMsg}">Error</span>
    </div>
    <div th:if="${successMsg}" class="alert alert-success">
      <span>✅</span>
      <span th:text="${successMsg}">Success</span>
    </div>
    <div th:if="${logoutMsg}" class="alert alert-info">
      <span>ℹ️</span>
      <span th:text="${logoutMsg}">Logged out</span>
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="••••••••" required/>
      </div>

      <button type="submit" class="btn btn-gold btn-full btn-lg" style="margin-top:8px">
        Sign In →
      </button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer-link">
      Don't have an account?
      <a th:href="@{/auth/register}">Create one</a>
    </div>
  </div>
</div>
</body>
</html>
